name: Deploy to Cloud Run

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install -r requirements-a2a.txt

      - name: Run tests
        run: pytest tests/ -v

  deploy:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy MCP server
        run: |
          gcloud run deploy preop-mcp-server \
            --source . \
            --region us-central1 \
            --allow-unauthenticated \
            --set-env-vars="GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" \
            --memory 512Mi \
            --timeout 60 \
            --min-instances 0 \
            --max-instances 3 \
            --project preop-intelligence \
            --quiet

      - name: Swap Dockerfile for A2A deploy
        run: |
          mv Dockerfile Dockerfile.mcp.bak
          mv Dockerfile.a2a Dockerfile

      - name: Deploy A2A agent
        run: |
          gcloud run deploy preop-agent \
            --source . \
            --region us-central1 \
            --allow-unauthenticated \
            --set-env-vars="GOOGLE_API_KEY=${{ secrets.GEMINI_API_KEY }},GOOGLE_GENAI_USE_VERTEXAI=FALSE,PO_PLATFORM_BASE_URL=https://app.promptopinion.ai,PREOP_AGENT_URL=https://preop-agent-yrv5ygakiq-uc.a.run.app" \
            --memory 1Gi \
            --timeout 300 \
            --min-instances 0 \
            --max-instances 3 \
            --project preop-intelligence \
            --quiet

      - name: Swap Dockerfile for PostOp deploy
        run: |
          mv Dockerfile Dockerfile.a2a.bak
          mv Dockerfile.postop Dockerfile

      - name: Deploy PostOp agent
        run: |
          gcloud run deploy postop-agent \
            --source . \
            --region us-central1 \
            --allow-unauthenticated \
            --set-env-vars="GOOGLE_API_KEY=${{ secrets.GEMINI_API_KEY }},GOOGLE_GENAI_USE_VERTEXAI=FALSE,PO_PLATFORM_BASE_URL=https://app.promptopinion.ai" \
            --memory 1Gi \
            --timeout 300 \
            --min-instances 0 \
            --max-instances 3 \
            --project preop-intelligence \
            --quiet

      - name: Patch POSTOP_AGENT_URL with public URL
        run: |
          POSTOP_URL=$(gcloud run services describe postop-agent \
            --region us-central1 --project preop-intelligence \
            --format='value(status.url)')
          gcloud run services update postop-agent \
            --region us-central1 --project preop-intelligence \
            --update-env-vars="POSTOP_AGENT_URL=${POSTOP_URL}" \
            --quiet
