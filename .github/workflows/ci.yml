name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install -r requirements-a2a.txt

      - name: Lint
        run: ruff check src/ tests/ preop_agent/ postop_agent/ shared/

      - name: Run tests
        run: pytest tests/ -v
